title: Automated Recon - Gobuster/ffuf Tool Detected via User-Agent
id: c9d8e7f6-0001-4000-8000-000000000001
status: test
description: >
  Detects HTTP requests from known directory brute-forcing and fuzzing tools
  by their default user-agent strings. Tools like gobuster and ffuf leave
  distinctive UA fingerprints when run without the --useragent override flag.
  These are almost never seen in legitimate production traffic.
author: Shawn Michael Sudaria
date: 2024/03/04
logsource:
    category: webserver
    product: apache
detection:
    selection:
        log_type: apache
        user_agent|contains:
            - 'gobuster'
            - 'ffuf'
            - 'dirbuster'
            - 'feroxbuster'
            - 'wfuzz'
            - 'dirb/'
            - 'nikto'
            - 'nuclei'
    condition: selection
falsepositives:
    - Authorized internal penetration tests
level: high
tags:
    - attack.reconnaissance
    - attack.t1595.003
    - attack.discovery
    - attack.t1083
