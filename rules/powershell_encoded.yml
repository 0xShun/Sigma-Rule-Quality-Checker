title: Suspicious PowerShell Execution with Encoded Command
id: d7bcd677-645d-4691-a8d4-7a5602b780d1
status: test
description: Detects PowerShell execution with base64 encoded command
    - https://attack.mitre.org/techniques/T1059/001/
author: Test User
date: 2024-01-15
modified: 2024-01-15
tags:
    - attack.execution
    - attack.t1059.001
    - attack.defense_evasion
    - attack.t1027
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - '-enc'
            - '-EncodedCommand'
            - '-e '
    condition: selection
falsepositives:
    - Legitimate administrative scripts
    - Software deployment tools
level: medium