title: Automated Recon - Multiple Sensitive Paths from Single IP
id: c9d8e7f6-0001-4000-8000-000000000001
status: test
description: >
  Detects a single external IP requesting multiple sensitive file paths
  (.env, .git, config, backup) in the same session. This pattern is
  characteristic of automated recon tools like gobuster, ffuf, or
  custom scrapers probing for exposed secrets and misconfigurations.
author: Detection Engineering Team
date: 2024/03/04
logsource:
    category: webserver
    product: apache
detection:
    selection:
        log_type: apache
        client_ip: '45.33.32.156'
        uri_path|contains:
            - '/.env'
            - '/.git'
            - '/config'
            - '/backup'
    condition: selection
falsepositives:
    - Authorized security scanners
level: high
tags:
    - attack.reconnaissance
    - attack.t1595.003
    - attack.discovery
    - attack.t1083
